<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyse CV - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="dashboard-grid">
            
            <div class="card">
                <h1>Bienvenue, <span id="user-display"></span></h1>
                <p>Vous êtes connecté à votre espace expert.</p>
            </div>

            <div id="cv-library" class="card" style="display: none;">
                <h3>📚 Ma bibliothèque de CV</h3>
                <ul id="cvs-list" style="list-style: none; padding: 0; margin: 0;"></ul>
            </div>

            <div class="card AnalyzeSection">
                <h3>Analyser une candidature</h3>
                
                <div id="selected-cv-info" style="display:none; background: #f0fdf4; border: 1px solid #bbf7d0; padding: 10px; margin-bottom: 15px; border-radius: 8px;">
                    <span id="selected-cv-name"></span>
                    <button type="button" onclick="clearSelectedCv()" style="background:none; color:red; border:none; cursor:pointer; font-size:12px; margin-left: 10px;">(Annuler)</button>
                </div>

                <form id="UploadForm">
                    <div id="file-input-container">
                        <label>Uploader un nouveau CV :</label>     
                        <input type="file" id="cvFile" accept="application/pdf" style="margin-top: 10px;">
                        
                        <div style="margin: 15px 0; text-align: left; color: #333;">
                            <input type="checkbox" id="saveCvCheck">
                            <label for="saveCvCheck">Sauvegarder ce CV dans ma bibliothèque</label>
                        </div>
                    </div>

                    <textarea id="jobOfferDescription" placeholder="Description du poste..." rows="8" required></textarea>
                    <button type="submit" id="uploadBtn">Lancer l'analyse</button>
                </form>
            </div>
        </div>

        <div class="footer-actions">
            <button onclick="logout()" class="btn-logout">Se déconnecter</button> 
        </div>

        <div id="loader" style="display:none; margin-top: 20px;">
            <p>🤖 Gemma 4 analyse votre CV...</p>
            <div class="spinner"></div>
        </div>

        <div id="analysis-result"></div>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof checkAuth === "function") checkAuth();
        });

        function displayAnalysis(score, details, advice, missing_skills) {
            const container = document.getElementById('analysis-result');
            let color = score >= 70 ? "#2ecc71" : (score >= 40 ? "#f1c40f" : "#e74c3c");
            
            container.innerHTML = `
                <div class="card result-card">
                    <h2 style="color: ${color};">Score : ${score}%</h2>
                    <div style="width: 100%; background: #eee; height: 10px; border-radius: 5px; margin-bottom: 20px;">
                        <div style="width: ${score}%; background: ${color}; height: 100%; border-radius: 5px; transition: width 1s;"></div>
                    </div>
                    <div class="result-grid">
                        <div class="result-box"><h4>Analyse</h4><p>${details}</p></div>
                        <div class="result-box"><h4>Conseils</h4><p>${advice || "N/A"}</p></div>
                    </div>
                </div>
            `;
            container.scrollIntoView({ behavior: 'smooth' });

        if (score >= 70 && missing_skills && missing_skills.length > 0) {
        const surveySection = document.createElement('div');
        surveySection.className = 'card';
        surveySection.style.marginTop = "20px";
        surveySection.innerHTML = `
            <h3>🎯 Précisons vos compétences</h3>
            <p>Pour atteindre 90%+, confirmez-vous maîtriser ces points ?</p>
            <div id="survey-questions">
                ${missing_skills.map((skill, index) => `
                    <div class="survey-item" style="margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px;">
                        <strong>${skill}</strong>
                        <div>
                            <input type="radio" name="q_${index}" value="yes" onclick="toggleContext(${index}, true)"> Oui 
                            <input type="radio" name="q_${index}" value="no" onclick="toggleContext(${index}, false)" checked> Non
                        </div>
                        <textarea id="note_${index}" style="display:none; width:100%; margin-top:10px;" placeholder="Détaillez votre expérience avec cet outil..."></textarea>
                    </div>
                `).join('')}
            </div>
            <button id="optimizeBtn" class="button" style="background:#6c5ce7; width:100%;">
    Générer la reformulation magique ✨
</button>
        `;
        container.appendChild(surveySection);
        // AJOUT DE L'ÉCOUTEUR APRÈS L'INJECTION DANS LE DOM
        document.getElementById('optimizeBtn').addEventListener('click', sendOptimizationRequest);
    }        
}

    </script>
</body>
</html>
