<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Bienvenue, <span id="user-display"></span></h1>
        <p>Vous êtes maintenant connecté à votre espace.</p>
        <button onclick="logout()" style = "margin-top: 20px;">Se deconnecter</button> 
    </div>
    <div class="AnalyzeSection">
        <h3>Analyser une candidature</h3>
        <form id="UploadForm">
            <input type="file" id="cvFile" accept="application/pdf" required>
            <textarea id="jobOfferDescription" placeholder="Collez ici la description du poste..." rows="10" required></textarea>
            <button type="submit" id="uploadBtn">Charger le CV</button>
        </form>
        <div id="analysis-result"></div>
    </div>
    <script src="script.js"></script>
    <script>
        window.onload = checkAuth();
    </script>
</body>
</html>
