<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyse CV - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style_2.css">
</head>
<body>
    <div class="sidebar">
        <h2 style="color: var(--primary);">🚀 ATS Optimizer</h2>
        
        <button class="theme-switch" onclick="toggleDarkMode()">
            🌙 Mode Sombre
        </button>

        <div id="cv-library" style="margin-top: 20px;">
            <h4 class="text-muted">📚 BIBLIOTHÈQUE</h4>
            <ul id="cvs-list" style="list-style:none; padding:0;"></ul>
        </div>

        <button onclick="logout()" class="btn-logout">Se déconnecter</button>
    </div>

    <!-- CONTENU PRINCIPAL -->
    <div class="main-content">
        <div class="card">
            <h1>Bonjour, <span id="user-display"></span></h1>
            <p>Prêt à décrocher votre prochain job ?</p>
        </div>

<div class="card AnalyzeSection">
    <h3>Analyse Intelligente</h3>
    
    <!-- Zone de confirmation : apparaît seulement si un CV est sélectionné -->
    <div id="selected-cv-info" style="display:none;">
        <span id="selected-cv-name"></span>
        <button type="button" onclick="handleCvSelection(selectedCvId)" 
                style="background:none; color:var(--danger); border:none; cursor:pointer; font-weight:bold;">
            Annuler
        </button>
    </div>

    <form id="UploadForm">
        <!-- Groupe Upload + Checkbox -->
        <div id="file-input-container">
            <div class="file-upload-wrapper" onclick="document.getElementById('cvFile').click()">
                <span>📁 Cliquez pour uploader un CV (PDF)</span>
                <input type="file" id="cvFile" hidden>
            </div>
            
            <!-- La checkbox est maintenant juste ici, sous l'upload -->
            <div style="margin: -5px 0 15px 0; text-align: left; display: flex; align-items: center; gap: 8px;">
                <input type="checkbox" id="saveCvCheck" style="width: auto; margin: 0;">
                <label for="saveCvCheck" style="margin: 0; font-size: 0.9rem; cursor: pointer;">
                    Sauvegarder dans ma bibliothèque
                </label>
            </div>
        </div>

        <textarea id="jobOfferDescription" placeholder="Copiez l'offre d'emploi ici..." rows="6" required></textarea>
        
        <button type="submit" id="uploadBtn">Lancer l'analyse</button>
    </form>
</div>

        <div id="loader" style="display:none;"><div class="spinner"></div></div>
        <div id="analysis-result"></div>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof checkAuth === "function") checkAuth();
        });

        function displayAnalysis(score, details, advice, missing_skills) {
            const container = document.getElementById('analysis-result');
            let color = score >= 70 ? "#2ecc71" : (score >= 40 ? "#f1c40f" : "#e74c3c");
            
            container.innerHTML = `
                <div class="card result-card">
                    <h2 style="color: ${color};">Score : ${score}%</h2>
                    <div style="width: 100%; background: #eee; height: 10px; border-radius: 5px; margin-bottom: 20px;">
                        <div style="width: ${score}%; background: ${color}; height: 100%; border-radius: 5px; transition: width 1s;"></div>
                    </div>
                    <div class="result-grid">
                        <div class="result-box"><h4>Analyse</h4><p>${details}</p></div>
                        <div class="result-box"><h4>Conseils</h4><p>${advice || "N/A"}</p></div>
                    </div>
                </div>
            `;
            container.scrollIntoView({ behavior: 'smooth' });

        if (score >= 70 && missing_skills && missing_skills.length > 0) {
        const surveySection = document.createElement('div');
        surveySection.className = 'card';
        surveySection.style.marginTop = "20px";
        surveySection.innerHTML = `
            <h3>🎯 Précisons vos compétences</h3>
            <p>Pour atteindre 90%+, confirmez-vous maîtriser ces points ?</p>
            <div id="survey-questions">
                ${missing_skills.map((skill, index) => `
                <div class="survey-item" style="margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px; text-align: left;">
                    <strong style="display: block; margin-bottom: 10px;">${skill}</strong>
                        <div style="display: flex; gap: 20px;">
                            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-weight: 400;">
                                <input type="radio" name="q_${index}" value="yes" onclick="toggleContext(${index}, true)" style="width: auto; margin: 0;"> Oui
                            </label>
                            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-weight: 400;">
                                <input type="radio" name="q_${index}" value="no" onclick="toggleContext(${index}, false)" checked style="width: auto; margin: 0;"> Non
                            </label>
                        </div>
                        <textarea id="note_${index}" style="display:none; width:100%; margin-top:10px; border-radius: 8px;" placeholder="Détaillez votre expérience..."></textarea>
                </div>  
                `).join('')}
            </div>
            <button id="optimizeBtn" class="button" style="background:#6c5ce7; width:100%;">
    Générer la reformulation magique ✨
</button>
        `;
        container.appendChild(surveySection);
        // AJOUT DE L'ÉCOUTEUR APRÈS L'INJECTION DANS LE DOM
        document.getElementById('optimizeBtn').addEventListener('click', sendOptimizationRequest);
    }        
}
    checkAuth();
    </script>
</body>
</html>
