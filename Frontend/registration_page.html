<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - ATS Optimizer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style_2.css">
</head>
<body class="auth-body">
    <div class="auth-container" style="max-width: 480px;">
        <div class="logo-area">
            <span>✨</span>
            <h2>ATS Optimizer</h2>
        </div>

        <div class="card auth-card">
            <h1>Créer un compte</h1>
            <p class="subtitle">Rejoignez les experts du recrutement.</p>
            
            <form id="registrationForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Prénom</label>
                        <input type="text" name="first_name" required>
                    </div>
                    <div class="form-group">
                        <label>Nom</label>
                        <input type="text" name="last_name" required>
                    </div>
                    <div class="form-group full-width">
                        <label>Email</label>
                        <input type="email" name="email" placeholder="nom@exemple.com" required>
                    </div>
                    <div class="form-group full-width">
                        <label>Nom d'utilisateur</label>
                        <input type="text" name="username" required>
                    </div>
                    <div class="form-group full-width">
                        <label>Mot de passe</label>
                        <input type="password" name="password" placeholder="••••••••" required>
                    </div>
                </div>
                <button type="submit" class="btn-primary">Créer mon compte</button>
                <p id="zone_response" class="response-message"></p>
            </form>

            <div class="auth-footer">
                Déjà inscrit ? 
                <a href="index.html" class="link-button">Se connecter</a>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
